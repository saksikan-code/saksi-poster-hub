# Netlify deployment config for this TanStack Start project.
# The @netlify/vite-plugin-tanstack-start plugin (loaded in vite.config.ts when NETLIFY=true)
# handles wiring the SSR handler as a Netlify Function automatically.

[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NETLIFY = "true"
  NODE_VERSION = "20"
  # Also set these in Netlify Dashboard: Site > Site configuration > Environment variables
  # VITE_SUPABASE_URL=https://your-project-id.supabase.co
  # VITE_SUPABASE_ANON_KEY=your-anon-key

# SPA / SSR fallback is added by the Netlify plugin; no manual redirects needed.